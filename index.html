<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Tiếng Trung — Lớp học</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --am:#FAEEDA;--am-b:#EF9F27;--am-d:#412402;--am-m:#633806;
  --tl:#E1F5EE;--tl-b:#1D9E75;--tl-d:#085041;
  --pu:#EEEDFE;--pu-b:#534AB7;--pu-d:#26215C;
  --rd:#FCEBEB;--rd-b:#E24B4A;--rd-d:#A32D2D;
  --bl:#E6F1FB;--bl-b:#2563EB;--bl-d:#1E40AF;
  --gr:#F5F5F5;--gr-b:#999;--gr-d:#444;
  --bg:#F7F6F2;--white:#fff;--text:#1A1A1A;--text2:#666;--border:#E8E8E8;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --cn:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text)}
@keyframes fadeUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.88)}70%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}

/* SCREENS */
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden}
.screen.on{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.scroll.nb{padding-bottom:70px}

/* LOADING */
#loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:999;font-size:12px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--am-b);border-radius:50%;animation:spin .7s linear infinite}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;font-weight:600;z-index:998;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.hdr-title{font-size:13px;font-weight:700;color:var(--am-d);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hdr-sub{font-size:10px;color:var(--text2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--rd-b);animation:popIn 1.2s infinite}
.live-badge{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--rd-d);background:var(--rd);padding:3px 8px;border-radius:50px}

/* PROGRESS */
.prog-wrap{height:3px;background:var(--border);flex-shrink:0}
.prog-bar{height:3px;background:linear-gradient(90deg,var(--am-b),var(--tl-b));transition:width .5s}

/* BOT NAV */
.bot-nav{background:var(--white);border-top:1px solid var(--border);display:flex;flex-shrink:0;overflow-x:auto;position:sticky;bottom:0;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;border:none;background:transparent;cursor:pointer;font-size:8px;font-weight:700;color:var(--text2);min-width:46px;flex:1;font-family:var(--font)}
.nav-btn.on{color:var(--am-m);background:var(--am)}
.nav-btn.sub{color:var(--rd-d)}
.nav-icon{font-size:16px;line-height:1}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;animation:fadeUp .3s ease}
.card-hdr{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border)}
.card-body{padding:12px 13px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;flex-shrink:0;text-align:center}
.sec-title{font-size:13px;font-weight:700}
.sec-desc{font-size:10px;color:var(--text2);margin-top:1px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:opacity .15s;min-height:40px;touch-action:manipulation}
.btn:active{opacity:.8}
.btn-am{background:var(--am-b);color:#fff}
.btn-tl{background:var(--tl);color:var(--tl-d)}
.btn-rd{background:var(--rd);color:var(--rd-d);border:1.5px solid var(--rd-b)}
.btn-ok{background:#fff;color:var(--tl-d);border:1.5px solid var(--tl-b)}
.btn-ng{background:#fff;color:var(--rd-d);border:1.5px solid var(--rd-b)}
.btn-gh{background:var(--gr);color:var(--gr-d);border:1px solid var(--border)}
.btn-sm{padding:5px 11px;font-size:11px;min-height:32px}

/* INPUT */
.inp{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:50px;font-size:13px;font-family:var(--font);outline:none;background:#fff;-webkit-appearance:none;transition:border-color .2s}
.inp:focus{border-color:var(--am-b)}
.inp.cn{font-family:var(--cn);font-size:18px;text-align:center;border-radius:12px}
.inp.ok{border-color:var(--tl-b);background:var(--tl);color:var(--tl-d)}
.inp.err{border-color:var(--rd-b);background:var(--rd)}
textarea.inp{border-radius:12px;resize:none;min-height:70px}

/* FEEDBACK */
.fb{border-radius:10px;padding:10px 12px;margin-top:8px;font-size:12px;font-weight:600;display:none;animation:popIn .3s ease;text-align:center}
.fb.ok{background:var(--tl);color:var(--tl-d);border:1.5px solid var(--tl-b)}
.fb.err{background:var(--rd);color:var(--rd-d);border:1.5px solid var(--rd-b)}
.expl{font-size:11px;font-weight:400;margin-top:4px;opacity:.9;line-height:1.5}

/* LESSON CARD */
.lesson-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;transition:all .15s;touch-action:manipulation;animation:fadeUp .3s ease}
.lesson-card:active{transform:scale(.98)}
.lesson-card.open{border-color:var(--am-b);background:var(--am)}
.lesson-name{font-size:14px;font-weight:700;margin-bottom:3px}
.lesson-meta{font-size:11px;color:var(--text2)}

/* GAME MENU */
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.game-card{border:2px solid var(--border);border-radius:14px;padding:13px 8px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;touch-action:manipulation}
.game-card:active{transform:scale(.97)}
.game-card.done{border-color:var(--tl-b);background:var(--tl)}
.game-icon{font-size:22px;margin-bottom:4px}
.game-title{font-size:12px;font-weight:700}
.game-sub{font-size:10px;color:var(--text2);margin-top:2px}
.game-done-tag{font-size:9px;font-weight:700;background:var(--tl-b);color:#fff;padding:1px 7px;border-radius:50px;display:inline-block;margin-top:3px}

/* FLASHCARD */
.fc-card{min-height:155px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:16px;transition:all .2s;user-select:none}

/* QUIZ */
.qz-box{border-radius:13px;padding:14px;text-align:center;margin-bottom:10px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.opt{border:none;border-radius:11px;padding:12px 6px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);text-align:center;line-height:1.35;min-height:52px;touch-action:manipulation}
.t-bar{height:4px;border-radius:2px;margin-bottom:7px;background:var(--border);overflow:hidden}
.t-fill{height:100%;border-radius:2px;transition:width 1s linear,background .4s}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mh{font-size:9px;font-weight:700;letter-spacing:.7px;border-bottom:2px solid;padding-bottom:3px;margin-bottom:6px}
.mi{min-height:42px;border-radius:50px;margin-bottom:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid var(--border);background:#fff;transition:all .15s;text-align:center;padding:5px 7px;font-weight:600;font-size:11px;line-height:1.3;word-break:break-all;touch-action:manipulation}
.mi.cn{font-family:var(--cn);font-size:16px}
.mi.sel{background:var(--pu);border-color:var(--pu-b);color:var(--pu-d)}
.mi.matched{background:var(--tl);border-color:var(--tl-b);color:var(--tl-d);cursor:default}
.mi.bad{animation:shake .3s ease;background:var(--rd);border-color:var(--rd-b);color:var(--rd-d)}

/* CLOZE */
.cloze-q{font-family:var(--cn);font-size:18px;font-weight:700;text-align:center;padding:14px;background:var(--am);border:1.5px solid var(--am-b);border-radius:12px;margin-bottom:10px;color:var(--am-d);line-height:1.8}
.copts{display:grid;gap:7px;margin-bottom:8px}
.copt{border:1.5px solid var(--border);border-radius:10px;padding:11px 5px;font-family:var(--cn);font-size:16px;font-weight:700;text-align:center;cursor:pointer;background:#fff;transition:all .15s;touch-action:manipulation}
.copt.ok{background:var(--tl);border-color:var(--tl-b);color:var(--tl-d)}
.copt.err{animation:shake .3s ease;background:var(--rd);border-color:var(--rd-b);color:var(--rd-d)}

/* SORT */
.sort-drop{min-height:52px;border:2px dashed var(--border);border-radius:12px;padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--gr)}
.sort-pool{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1.5px solid var(--border);border-radius:12px;background:#fff;min-height:44px}
.chip{font-family:var(--cn);font-size:15px;font-weight:700;padding:7px 12px;border-radius:50px;cursor:pointer;touch-action:manipulation}
.chip.pool{background:var(--am);color:var(--am-d);border:1.5px solid var(--am-b)}
.chip.drop{background:var(--pu);color:var(--pu-d);border:1.5px solid var(--pu-b)}

/* TRANSLATE */
.trans-q{font-family:var(--cn);font-size:20px;font-weight:700;text-align:center;padding:14px;background:var(--bl);border:1.5px solid var(--bl-b);border-radius:13px;margin-bottom:8px;color:var(--bl-d);line-height:1.4}

/* RESULT */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:9px 0}
.sbox{background:var(--gr);border-radius:10px;padding:8px 5px;text-align:center}
.sn{font-size:18px;font-weight:700}.sl{font-size:10px;color:var(--text2)}
.pct-wrap{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:5px 0}
.pct-fill{height:100%;border-radius:4px;transition:width .9s}
.rev-item{border:1px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:7px;background:#fff}
.rev-han{font-family:var(--cn);font-size:16px;font-weight:700;color:var(--am-d);margin-bottom:3px}
.rev-row{font-size:11px;margin-bottom:2px}
.rev-ex{font-size:10px;color:var(--text2);margin-top:4px;padding-top:4px;border-top:1px solid var(--border);line-height:1.5}

/* ADMIN */
.adm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.adm-stat{background:#fff;border:1px solid var(--border);border-radius:11px;padding:9px 6px;text-align:center}
.adm-n{font-size:18px;font-weight:700;margin-bottom:2px}.adm-l{font-size:9px;color:var(--text2)}
.atabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.atab{padding:5px 10px;border-radius:50px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:700;cursor:pointer;color:var(--text2);font-family:var(--font);min-height:30px}
.atab.on{background:var(--am-b);border-color:var(--am-b);color:#fff}
.ap{display:none}.ap.on{display:block}
.st-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-rank{font-size:12px;font-weight:700;width:22px;text-align:center;flex-shrink:0}
.st-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-cls{font-size:9px;color:var(--text2)}
.st-pct{font-size:11px;font-weight:700;flex-shrink:0;width:32px;text-align:right}
.st-score{font-size:12px;font-weight:700;color:var(--am-m);flex-shrink:0}
.lm-item{border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:9px;background:#fff}
.lm-item.open{border-color:var(--tl-b)}
.lm-name{font-size:13px;font-weight:700;flex:1}
.lm-meta{font-size:10px;color:var(--text2);margin:4px 0 7px}
.lm-acts{display:flex;gap:5px;flex-wrap:wrap}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:10px;width:60px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:16px;background:var(--gr);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:5px;font-size:9px;font-weight:700;color:#fff}
.bar-val{font-size:10px;font-weight:700;width:28px;flex-shrink:0}
.vocab-chip{display:inline-block;background:var(--am);color:var(--am-m);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:600;margin:2px;font-family:var(--cn)}

/* POPUP */
.popup-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.popup{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px 14px 30px;animation:slideUp .3s ease}
.popup-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:sticky;top:0;background:#fff;padding-bottom:8px;border-bottom:1px solid var(--border)}
.popup-title{font-size:14px;font-weight:700}
.popup-close{border:none;background:var(--gr);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:15px}

/* FORM */
.flabel{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:4px;letter-spacing:.3px}
.add-inp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:50px;font-size:12px;font-family:var(--font);outline:none;background:#fff;margin-bottom:6px;-webkit-appearance:none}
.add-inp:focus{border-color:var(--am-b)}
.dtabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:12px}
.dtab{padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;text-align:center;line-height:1.4}
.dtab.on{border-color:var(--am-b);background:var(--am);color:var(--am-m)}
.dp{display:none}.dp.on{display:block}

/* PASS */
.pass-center{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.pass-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:300px;text-align:center}

@media(min-width:480px){.scroll,.bot-nav,.hdr,.prog-wrap{max-width:480px;margin-left:auto;margin-right:auto}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span id="load-txt">Đang tải…</span></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen on" id="s-login">
  <div class="scroll" style="display:flex;flex-direction:column;justify-content:center;min-height:100vh">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:6px">🈶</div>
      <div style="font-size:20px;font-weight:700;color:var(--am-d)">Lớp học Tiếng Trung</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">Học từ vựng · Ôn tập · Ghi nhận kết quả</div>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="flabel" style="margin-bottom:5px">HỌ VÀ TÊN</div>
        <input class="inp" id="inp-name" placeholder="VD: Nguyễn Văn An" type="text" autocomplete="name" style="margin-bottom:10px">
        <div class="flabel" style="margin-bottom:5px">LỚP HỌC</div>
        <input class="inp" id="inp-cls" placeholder="VD: Lớp Thứ 3 — 19h" type="text" style="margin-bottom:14px">
        <button class="btn btn-am" style="width:100%" onclick="doLogin()">Vào học →</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px">
      <span onclick="goPass()" style="font-size:12px;color:var(--pu-b);font-weight:700;cursor:pointer;padding:8px">🔐 Giáo viên</span>
    </div>
  </div>
</div>

<!-- PASS -->
<div class="screen" id="s-pass">
  <div class="pass-center">
    <div class="pass-card">
      <div style="font-size:36px;margin-bottom:10px">🔐</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">Dành cho giáo viên</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:14px">Nhập mật khẩu để vào bảng điều khiển</div>
      <input class="inp" id="pass-inp" type="password" placeholder="Mật khẩu…" style="text-align:center;margin-bottom:10px" onkeydown="if(event.key==='Enter')checkPass()">
      <button class="btn btn-am" style="width:100%;margin-bottom:10px" onclick="checkPass()">Xác nhận</button>
      <div id="pass-err" style="font-size:11px;color:var(--rd-d);display:none;font-weight:600">❌ Sai mật khẩu!</div>
      <div style="margin-top:12px"><span onclick="show('s-login')" style="font-size:11px;color:var(--text2);cursor:pointer">← Quay lại</span></div>
    </div>
  </div>
</div>

<!-- LESSON SELECT -->
<div class="screen" id="s-lessons">
  <div class="hdr">
    <div>
      <div class="hdr-title" id="greet-txt">Xin chào!</div>
      <div class="hdr-sub">Chọn bài học để bắt đầu</div>
    </div>
    <span onclick="show('s-login')" style="font-size:11px;color:var(--pu-b);font-weight:700;cursor:pointer;padding:6px;flex-shrink:0">← Đổi tên</span>
  </div>
  <div class="scroll" id="lesson-list"></div>
</div>

<!-- APP (học viên làm bài) -->
<div class="screen" id="s-app">
  <div class="hdr">
    <div style="min-width:0;flex:1;margin-right:8px">
      <div class="hdr-title" id="app-title">—</div>
      <div class="hdr-sub" id="app-sub">—</div>
    </div>
    <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div style="background:var(--am);color:var(--am-m);font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="user-chip">…</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  <div class="scroll nb" id="main-content"></div>
  <div class="bot-nav" id="bot-nav"></div>
</div>

<!-- ADMIN -->
<div class="screen" id="s-admin">
  <div class="hdr">
    <div><div style="font-size:13px;font-weight:700">Bảng điều khiển</div><div class="hdr-sub">Giáo viên</div></div>
    <div style="display:flex;gap:5px">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button onclick="renderAdmin()" style="font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:50px;background:#fff;cursor:pointer;font-family:var(--font);color:var(--text2);font-weight:600">↻</button>
      <button onclick="show('s-login')" style="font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:50px;background:#fff;cursor:pointer;font-family:var(--font);color:var(--text2);font-weight:600">Thoát</button>
    </div>
  </div>
  <div class="scroll" id="admin-content"><div style="text-align:center;padding:40px"><div class="spinner" style="margin-bottom:12px"></div>Đang tải…</div></div>
</div>

<script>
// ================================================================
// CONFIG
// ================================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycby2FTk6gff932a2sQG2TPlZm-xTfTJRJVE93n1Ol954-oeV8IX2-85o4Ypbgrb7OT-RrQ/exec';

// ================================================================
// UTILS
// ================================================================
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function load(v,t='Đang tải…'){document.getElementById('loading').style.display=v?'flex':'none';document.getElementById('load-txt').textContent=t;}
function toast(m,d=2400){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function shuf(n){return[...Array(n).keys()].sort(()=>Math.random()-.5);}
function showFb(el,ok,title,body=''){if(!el)return;el.className='fb '+(ok?'ok':'err');el.innerHTML=`<b>${ok?'✓':'✗'} ${title}</b>${body?`<div class="expl">${body}</div>`:''}`;el.style.display='block';}

// ================================================================
// GAS API
// ================================================================
async function gasGet(action){
  const r=await fetch(GAS_URL+'?action='+action);
  if(!r.ok)throw new Error('GET '+action+' failed: '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'Unknown error');
  return j.data;
}
async function gasPost(body){
  const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(body)});
  if(!r.ok)throw new Error('POST failed: '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'Unknown error');
  return j.data;
}

// ================================================================
// FETCH
// ================================================================
async function fetchLessons(force=false){
  if(!force&&lessonsData.length>0)return lessonsData;
  const d=await gasGet('getLessons');
  lessonsData=Array.isArray(d)?d:[];
  lessonsData.forEach(l=>{if(!l.enabledGames)l.enabledGames=[...DEFAULT_GAMES];if(!l.cloze)l.cloze=[];if(!l.bushou)l.bushou=[];});
  return lessonsData;
}
async function fetchResults(force=false){
  const d=await gasGet('getResults');
  resultsData=d&&typeof d==='object'?d:{};
  return resultsData;
}

// ================================================================
// LESSON LIST
// ================================================================
async function loadLessons(){
  const wrap=document.getElementById('lesson-list');
  wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)"><div class="spinner" style="margin-bottom:12px"></div>Đang tải…</div>';
  try{
    await fetchLessons(true);
    const open=lessonsData.filter(l=>l.isOpen);
    if(open.length===0){
      wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)"><div style="font-size:32px;margin-bottom:8px">📭</div><b>Chưa có bài nào được mở</b><br><span style="font-size:11px">Vui lòng đợi giáo viên!</span></div>';
      return;
    }
    wrap.innerHTML=open.map(l=>{
      const eg=l.enabledGames||DEFAULT_GAMES;
      const icons=eg.map(g=>ALL_GAMES.find(x=>x.id===g)?.icon||'').join(' ');
      return `<div class="lesson-card open" onclick="startLesson('${l.id}')">
        <div class="lesson-name">${l.name}</div>
        <div class="lesson-meta">${l.vocab.length} từ · ${eg.length} dạng bài: ${icons}</div>
      </div>`;
    }).join('');
  }catch(e){wrap.innerHTML=`<div style="text-align:center;padding:30px;color:var(--rd-d)">Lỗi: ${e.message}<br><span onclick="loadLessons()" style="color:var(--pu-b);cursor:pointer;font-weight:700">Thử lại</span></div>`;}
}

async function startLesson(lid){
  load(true,'Đang vào bài…');
  try{
    await fetchLessons(true);
    currentLesson=lessonsData.find(l=>l.id===lid);
    if(!currentLesson){load(false);toast('Không tìm thấy bài!');return;}
    const eg=currentLesson.enabledGames||DEFAULT_GAMES;
    st={done:{},scores:{},rights:{},wrongs:{},wrongItems:[]};
    eg.forEach(g=>{st.done[g]=false;st.scores[g]=0;st.rights[g]=0;st.wrongs[g]=0;});
    submitted=false;curGame='menu';
    fcOrder=shuf(currentLesson.vocab.length);fcIdx=0;
    mcSel=null;mcRight=0;
    qzOrder=shuf(currentLesson.vocab.length);qzIdx=0;qzRight=0;qzScore=0;
    wrOrder=shuf(currentLesson.vocab.length);wrIdx=0;wrRight=0;
    clItems=currentLesson.cloze||[];clOrder=shuf(clItems.length);clIdx=0;clRight=0;
    sxItems=currentLesson.cloze||[];sxOrder=shuf(sxItems.length);sxIdx=0;sxRight=0;
    bshOrder=shuf((currentLesson.bushou||[]).length);bshIdx=0;bshRight=0;
    trOrder=shuf(currentLesson.vocab.length);trIdx=0;trRight=0;
    sessionId=user.name.replace(/\s+/g,'_')+'_'+Date.now();
    document.getElementById('app-title').textContent=currentLesson.name;
    document.getElementById('app-sub').textContent=user.name+' · '+user.cls;
    load(false);show('s-app');renderMenu();
  }catch(e){load(false);toast('Lỗi: '+e.message);}
}

// ================================================================
// NAV & MENU
// ================================================================
function buildNav(){
  const eg=currentLesson?.enabledGames||DEFAULT_GAMES;
  document.getElementById('bot-nav').innerHTML=
    eg.map(g=>{const gx=ALL_GAMES.find(x=>x.id===g);if(!gx)return'';const done=st.done[g];
      return `<button class="nav-btn ${curGame===g?'on':''}" onclick="switchGame('${g}')"><span class="nav-icon">${gx.icon}${done?'✓':''}</span>${gx.name}</button>`;
    }).join('')+
    `<button class="nav-btn sub" onclick="submitBai()"><span class="nav-icon">📤</span>Nộp bài</button>`;
}
function switchGame(g){
  if(curGame===g)return;
  if(qzTimer){clearInterval(qzTimer);qzTimer=null;}
  curGame=g;buildNav();
  ({fc:renderFC,mc:renderMC,qz:renderQZ,wr:renderWR,cl:renderCL,sx:renderSX,tr:renderTR,menu:renderMenu}[g]||renderMenu)();
}
function updateProg(){
  const eg=currentLesson?.enabledGames||[];
  const d=eg.filter(g=>st.done[g]).length;
  document.getElementById('prog').style.width=(eg.length?d/eg.length*100:0)+'%';
  buildNav();
}

function renderMenu(){
  curGame='menu';buildNav();
  const eg=currentLesson?.enabledGames||DEFAULT_GAMES;
  const ts=Object.values(st.scores).reduce((a,b)=>a+b,0);
  const dc=eg.filter(g=>st.done[g]).length;
  document.getElementById('main-content').innerHTML=`
    <div style="text-align:center;padding:12px 0 8px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:3px">Tiến độ: ${dc}/${eg.length} dạng bài</div>
      <div style="font-size:30px;font-weight:700;color:var(--am-m)">${ts} điểm</div>
    </div>
    <div class="game-grid">
      ${eg.map(g=>{const gx=ALL_GAMES.find(x=>x.id===g);if(!gx)return'';const done=st.done[g];
        return `<div class="game-card ${done?'done':''}" onclick="switchGame('${g}')">
          <div class="game-icon">${gx.icon}</div>
          <div class="game-title">${gx.name}</div>
          <div class="game-sub">${gx.desc}</div>
          ${done?`<div class="game-done-tag">✓ +${st.scores[g]}đ</div>`:'<div style="font-size:9px;color:var(--am-b);font-weight:600;margin-top:3px">Bấm để làm →</div>'}
        </div>`;}).join('')}
    </div>
    ${dc===eg.length?'<div style="text-align:center"><button class="btn btn-am" onclick="submitBai()">📤 Nộp bài ngay</button></div>':''}`;
}

// ================================================================
// SUBMIT
// ================================================================
async function submitBai(){
  if(submitted){toast('Đã nộp bài rồi!');return;}
  if(!confirm('Nộp bài ngay?\n(Có thể nộp dù chưa làm hết)'))return;
  submitted=true;
  try{
    const eg=currentLesson.enabledGames||DEFAULT_GAMES;
    const vl=currentLesson.vocab||[];
    const seen=new Set(st.wrongItems.map(w=>w.char+'|'+w.ans));
    function addM(char,ans,correct,explain){const k=char+'|'+ans;if(!seen.has(k)){seen.add(k);st.wrongItems.push({char,ans:ans||'—',correct:correct||'',explain:explain||''}); }}
    // Ghi câu chưa làm
    if(eg.includes('fc')){const o=fcOrder.length>0?fcOrder:[...Array(vl.length).keys()];for(let i=fcIdx;i<o.length&&i<vl.length;i++){const v=vl[o[i]];if(v)addM(v.char,'(chưa ôn)',v.viet,v.explain);}}
    if(eg.includes('qz')&&!st.done.qz){const o=qzOrder.length>0?qzOrder:[...Array(vl.length).keys()];for(let i=qzIdx;i<o.length&&i<vl.length;i++){const v=vl[o[i]];if(v)addM(v.char,'(chưa làm)',v.viet,v.explain);}}
    if(eg.includes('wr')&&!st.done.wr){const o=wrOrder.length>0?wrOrder:[...Array(vl.length).keys()];for(let i=wrIdx;i<o.length&&i<vl.length;i++){const v=vl[o[i]];if(v)addM(v.char,'(chưa làm)',v.viet,v.explain);}}
    if(eg.includes('mc')&&!st.done.mc){vl.slice(0,Math.min(vl.length,10)).forEach(v=>{if(v)addM(v.char,'(chưa làm)',v.viet,v.explain);});}
    if(eg.includes('cl')&&!st.done.cl){clItems.forEach(c=>{if(c)addM(c.sentence,'(chưa làm)',c.answer,'');});}
    if(eg.includes('sx')&&!st.done.sx){sxItems.forEach(s=>{if(s)addM(s.sentence||s.char,'(chưa làm)',s.sentence||s.char,'');});}
    if(eg.includes('tr')&&!st.done.tr){const o=trOrder.length>0?trOrder:[...Array(vl.length).keys()];for(let i=trIdx;i<o.length&&i<vl.length;i++){const v=vl[o[i]];if(v)addM(v.char,'(chưa làm)',v.viet,v.explain);}}
    const tr=Object.values(st.rights).reduce((a,b)=>a+b,0);
    const tw=Object.values(st.wrongs).reduce((a,b)=>a+b,0);
    const pct=tr+tw>0?Math.round(tr/(tr+tw)*100):0;
    const ts=Object.values(st.scores).reduce((a,b)=>a+b,0);
    const result={...user,sessionId,lessonId:currentLesson.id,lessonName:currentLesson.name,
      finishedAt:Date.now(),status:'done',scores:{...st.scores},rights:{...st.rights},wrongs:{...st.wrongs},
      totalScore:ts,totalRight:tr,totalAll:tr+tw,pct,wrongItems:[...st.wrongItems],
      doneGames:Object.keys(st.done).filter(k=>st.done[k])};
    load(true,'Đang nộp bài…');
    try{await gasPost({action:'saveResult',result});toast('✅ Đã nộp bài!');}
    catch(e){toast('⚠️ Lỗi mạng — hiển thị kết quả nhưng chưa lưu!');}
    load(false);
  }catch(err){submitted=false;load(false);toast('Lỗi: '+err.message);}
  renderResult();
}

function renderResult(){
  curGame='result';buildNav();
  const tr=Object.values(st.rights).reduce((a,b)=>a+b,0);
  const tw=Object.values(st.wrongs).reduce((a,b)=>a+b,0);
  const pct=tr+tw>0?Math.round(tr/(tr+tw)*100):0;
  const ts=Object.values(st.scores).reduce((a,b)=>a+b,0);
  const rank=pct===100?'Hoàn hảo! 🏆':pct>=80?'Xuất sắc! 🥈':pct>=60?'Khá tốt! 🥉':'Cần luyện thêm 💪';
  const bc=pct>=80?'#1D9E75':pct>=60?'#EF9F27':'#E24B4A';
  const grp={};st.wrongItems.forEach(w=>{if(!grp[w.char])grp[w.char]={...w,reasons:[]};grp[w.char].reasons.push(w.ans);});
  const wl=Object.values(grp);
  const note=submitted
    ?`<div style="background:var(--tl);color:var(--tl-d);border:1.5px solid var(--tl-b);border-radius:10px;padding:9px;font-size:12px;font-weight:600;text-align:center;margin-bottom:10px">✅ Đã nộp bài — giáo viên đã nhận</div>`
    :`<div style="background:var(--am);border:1.5px solid var(--am-b);border-radius:10px;padding:9px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px"><span style="font-size:12px;font-weight:600;color:var(--am-d)">⚠️ Chưa nộp</span><button class="btn btn-am" style="padding:6px 14px;font-size:12px" onclick="submitBai()">📤 Nộp ngay</button></div>`;
  document.getElementById('main-content').innerHTML=`<div class="card"><div class="card-body">
    ${note}
    <div style="text-align:center;padding:10px 0 8px">
      <div style="font-size:44px;font-weight:700;color:var(--am-m)">${ts}</div>
      <div style="font-size:11px;color:var(--text2)">tổng điểm</div>
      <div style="font-size:17px;margin-top:4px">${rank}</div>
    </div>
    <div class="stat-row">
      <div class="sbox"><div class="sn" style="color:var(--tl-d)">${tr}</div><div class="sl">Đúng</div></div>
      <div class="sbox"><div class="sn" style="color:var(--rd-d)">${tw}</div><div class="sl">Sai</div></div>
      <div class="sbox"><div class="sn" style="color:var(--pu-b)">${pct}%</div><div class="sl">Tỉ lệ</div></div>
    </div>
    <div class="pct-wrap"><div class="pct-fill" id="pct-b" style="width:0%;background:${bc}"></div></div>
    <div style="font-size:11px;font-weight:700;margin:11px 0 7px">Cần ôn thêm (${wl.length} mục)</div>
    ${wl.length===0?'<div style="text-align:center;padding:10px;color:var(--tl-d);font-weight:700">🎉 Không có mục nào cần ôn!</div>'
      :wl.map(w=>`<div class="rev-item"><div class="rev-han">${w.char}</div>
        <div class="rev-row" style="color:var(--rd-d)">✗ ${[...new Set(w.reasons)].join(' · ')}</div>
        <div class="rev-row" style="color:var(--tl-d)">✓ ${w.correct}</div>
        ${w.explain?`<div class="rev-ex">${w.explain}</div>`:''}
      </div>`).join('')}
    <div style="text-align:center;margin-top:12px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-gh" onclick="show('s-lessons');loadLessons()">← Chọn bài khác</button>
      <button class="btn btn-gh" onclick="startLesson(currentLesson.id)">Làm lại</button>
    </div>
  </div></div>`;
  setTimeout(()=>{const b=document.getElementById('pct-b');if(b)b.style.width=pct+'%';},80);
}

function renderFC(){
  const vl=currentLesson.vocab;const c=document.getElementById('main-content');
  if(fcIdx>=vl.length){
    st.done.fc=true;st.scores.fc=50;updateProg();
    c.innerHTML=`<div class="card"><div class="card-body" style="text-align:center;padding:18px">
      <div style="font-size:26px;margin-bottom:7px">✅</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">Đã ôn xong ${vl.length} từ! +50 điểm</div>
      <div style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-gh" onclick="fcOrder=shuf(currentLesson.vocab.length);fcIdx=0;renderFC()">Ôn lại</button>
        <button class="btn btn-am" onclick="renderMenu()">← Menu</button>
      </div></div></div>`;return;
  }
  const v=vl[fcOrder[fcIdx]];const lg=v.char.length>4;
  c.innerHTML=`<div class="card">
    <div class="card-hdr"><div class="badge" style="background:var(--am);color:var(--am-m)">Ôn từ</div>
    <div><div class="sec-title">Flashcard (${fcIdx+1}/${vl.length})</div><div class="sec-desc">Nhấn thẻ để lật xem nghĩa</div></div></div>
    <div class="card-body">
      <div class="fc-card" id="fc-c" style="background:var(--am);border:2px solid var(--am-b)" onclick="flipFC()">
        <div style="font-family:var(--cn);font-size:${lg?'18px':'52px'};font-weight:700;color:var(--am-d);text-align:center;line-height:1.3">${v.char}</div>
        <div style="font-size:10px;color:var(--am-m);margin-top:9px;letter-spacing:.4px">nhấn để lật</div>
      </div>
      <div style="display:flex;gap:7px;justify-content:center;margin-top:10px">
        <button class="btn btn-ng" onclick="fcMarkWrong()">✗ Chưa nhớ</button>
        <button class="btn btn-ok" onclick="fcIdx++;renderFC()">✓ Đã nhớ</button>
      </div>
    </div></div>`;
}
function flipFC(){
  const v=currentLesson.vocab[fcOrder[fcIdx]];const c=document.getElementById('fc-c');const lg=v.char.length>4;
  c.style.background='var(--tl)';c.style.borderColor='var(--tl-b)';c.onclick=null;
  c.innerHTML=`<div style="font-family:var(--cn);font-size:${lg?'15px':'42px'};font-weight:700;color:var(--tl-d);animation:flipIn .3s ease;text-align:center;line-height:1.3">${v.char}</div>
    <div style="font-size:16px;font-weight:700;color:var(--tl-d);margin-top:6px">${v.pinyin}</div>
    <div style="font-size:12px;color:var(--tl-d);margin-top:2px">${v.viet}</div>
    ${v.explain?`<div style="font-size:10px;color:var(--tl-d);margin-top:5px;opacity:.8;text-align:center">${v.explain}</div>`:''}`;
}
function fcMarkWrong(){
  const v=currentLesson.vocab[fcOrder[fcIdx]];
  if(!st.wrongItems.find(w=>w.char===v.char&&w.ans==='(chưa nhớ)'))
    st.wrongItems.push({char:v.char,ans:'(chưa nhớ)',correct:v.viet,explain:v.explain||''});
  fcIdx++;renderFC();
}

// ================================================================
// MATCHING
// ================================================================
function renderMC(){
  if(st.done.mc){doneDane('mc','Nối từ','🔗');return;}
  mcSel=null;mcRight=0;
  const vl=currentLesson.vocab;const sl=vl.slice(0,Math.min(vl.length,10));
  const sv=[...sl].sort(()=>Math.random()-.5);
  document.getElementById('main-content').innerHTML=`<div class="card">
    <div class="card-hdr"><div class="badge" style="background:var(--tl);color:var(--tl-d)">Nối từ</div>
    <div><div class="sec-title">Nối từ (${sl.length} cặp)</div><div class="sec-desc">Chọn chữ Hán rồi chọn nghĩa đúng</div></div></div>
    <div class="card-body">
      <div class="match-grid">
        <div><div class="mh" style="color:var(--pu-b);border-color:var(--pu-b)">CHỮ HÁN</div><div id="mc-c"></div></div>
        <div><div class="mh" style="color:var(--tl-b);border-color:var(--tl-b)">NGHĨA</div><div id="mc-v"></div></div>
      </div>
      <div id="mc-fb" class="fb"></div>
    </div></div>`;
  sl.forEach(v=>{const e=mkMI(v.char.length>5?v.char.slice(0,4)+'…':v.char,v.char,'c',true);document.getElementById('mc-c').appendChild(e);});
  sv.forEach(v=>document.getElementById('mc-v').appendChild(mkMI(v.viet,v.char,'v',false)));
}
function mkMI(l,k,t,cn){const e=document.createElement('div');e.className='mi'+(cn?' cn':'');e.dataset.k=k;e.dataset.t=t;e.textContent=l;e.onclick=()=>mClick(e);return e;}
function mClick(el){
  if(el.classList.contains('matched'))return;
  if(mcSel===el){el.classList.remove('sel');mcSel=null;return;}
  if(mcSel&&mcSel.dataset.t===el.dataset.t){mcSel.classList.remove('sel');mcSel=el;el.classList.add('sel');return;}
  if(!mcSel){mcSel=el;el.classList.add('sel');return;}
  const a=mcSel,b=el;mcSel=null;const fb=document.getElementById('mc-fb');
  if(a.dataset.k===b.dataset.k){
    mcRight++;st.rights.mc++;
    [a,b].forEach(x=>{x.classList.remove('sel');x.classList.add('matched');x.onclick=null;});
    const v=currentLesson.vocab.find(v=>v.char===a.dataset.k);
    if(fb)showFb(fb,true,`${v?.char} = ${v?.viet}`,v?.explain||'');
    const tot=Math.min(currentLesson.vocab.length,10);
    if(mcRight===tot){st.done.mc=true;st.scores.mc=tot*10;updateProg();setTimeout(()=>doneDane('mc','Nối từ','🔗'),600);}
  }else{
    st.wrongs.mc++;const v=currentLesson.vocab.find(v=>v.char===a.dataset.k);
    if(v)st.wrongItems.push({char:v.char,ans:b.textContent,correct:v.viet,explain:v.explain||''});
    if(fb)showFb(fb,false,'Chưa đúng!',`${a.textContent} ≠ ${b.textContent}`);
    [a,b].forEach(x=>{x.classList.remove('sel');x.classList.add('bad');setTimeout(()=>x.classList.remove('bad'),400);});
  }
}

function renderQZ(){

  renderQZQ();

function renderQZQ(){
  if(qzTimer){clearInterval(qzTimer);qzTimer=null;}
  const vl=currentLesson.vocab;
  if(qzIdx>=vl.length){
    st.done.qz=true;st.scores.qz=qzScore;st.rights.qz=qzRight;st.wrongs.qz=vl.length-qzRight;
    updateProg();doneDane('qz','Quiz','⚡');return;
  }
  const v=vl[qzOrder[qzIdx]];
  const pool=[...vl.filter(x=>x.char!==v.char)].sort(()=>Math.random()-.5);
  const opts=[v];for(const it of pool){if(opts.length>=Math.min(4,vl.length))break;if(!opts.find(o=>o.char===it.char))opts.push(it);}
  opts.sort(()=>Math.random()-.5);qzSec=15;qzDone=false;
  const lg=v.char.length>4;
  const COLS=[['#3C3489','#EEEDFE'],['#085041','#E1F5EE'],['#712B13','#FAECE7'],['#633806','#FAEEDA']];
  document.getElementById('main-content').innerHTML=`<div class="card">
    <div class="card-hdr"><div class="badge" style="background:#FAECE7;color:#712B13">Quiz</div>
    <div><div class="sec-title">Quiz (${qzIdx+1}/${vl.length})</div><div class="sec-desc">Chọn nghĩa đúng trước hết giờ</div></div></div>
    <div class="card-body">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:var(--text2)">✓${qzRight} · ${qzScore}đ</span><span id="qz-t" style="font-size:11px;font-weight:700;color:#3C3489">${qzSec}s</span></div>
      <div class="t-bar"><div id="qz-b" class="t-fill" style="width:100%;background:#3C3489"></div></div>
      <div class="qz-box" style="background:var(--am);border:2px solid var(--am-b)">
        <div style="font-family:var(--cn);font-size:${lg?'17px':'44px'};font-weight:700;color:var(--am-d);line-height:${lg?'1.4':'1'};text-align:center">${v.char}</div>
        <div style="font-size:12px;font-weight:700;color:var(--am-m);margin-top:4px">${v.pinyin}</div>
      </div>
      <div class="opts" id="qz-opts"></div>
      <div id="qz-fb" class="fb"></div>
    </div></div>`;
  const og=document.getElementById('qz-opts');
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');btn.className='opt';btn.style.background=COLS[i][0];btn.style.color=COLS[i][1];btn.textContent=o.viet;
    btn.onclick=()=>qzAns(btn,o.char,v.char);og.appendChild(btn);
  });
  qzTimer=setInterval(()=>{
    qzSec--;const t=document.getElementById('qz-t'),b=document.getElementById('qz-b');
    if(t)t.textContent=qzSec+'s';
    if(b){b.style.width=(qzSec/15*100)+'%';b.style.background=qzSec<=4?'#E24B4A':qzSec<=8?'#EF9F27':'#3C3489';}
    if(qzSec<=0){clearInterval(qzTimer);qzTimer=null;if(!qzDone){qzDone=true;
      st.wrongItems.push({char:v.char,ans:'(hết giờ)',correct:v.viet,explain:v.explain||''});
      st.wrongs.qz++;const fb=document.getElementById('qz-fb');if(fb)showFb(fb,false,'⏰ Hết giờ! Đáp án: '+v.viet,v.explain||'');
      setTimeout(()=>{qzIdx++;renderQZQ();},1400);}}
  },1000);
}
function qzAns(btn,oChar,vChar){
  if(qzDone)return;qzDone=true;if(qzTimer){clearInterval(qzTimer);qzTimer=null;}
  const v=currentLesson.vocab[qzOrder[qzIdx]];const fb=document.getElementById('qz-fb');
  if(oChar===vChar){qzRight++;const g=Math.max(10,qzSec*10);qzScore+=g;btn.style.outline='3px solid #1D9E75';if(fb)showFb(fb,true,`+${g} điểm!`,v.explain||'');}
  else{btn.style.outline='3px solid #E24B4A';st.wrongItems.push({char:v.char,ans:btn.textContent,correct:v.viet,explain:v.explain||''});st.wrongs.qz++;if(fb)showFb(fb,false,'Sai! Đáp án: '+v.viet,v.explain||'');}
  setTimeout(()=>{qzIdx++;renderQZQ();},1600);
}

  const v=sxItems[sxOrder[sxIdx]];
  const chars=Array.from(v.char);
  sxMap=chars.map((c,i)=>({c,i,used:false})).sort(()=>Math.random()-.5);
  sxSelected=[];
  const render=()=>{
    const drop=document.getElementById('sx-drop'),pool=document.getElementById('sx-pool');

    drop.innerHTML=sxSelected.length===0?'<span style="color:var(--text2);font-size:11px">Bấm chữ bên dưới…</span>'
      :sxSelected.map((m,pos)=>`<div class="chip drop" data-pos="${pos}">${m.c}</div>`).join('');
    document.querySelectorAll('#sx-drop .chip').forEach(chip=>{
      const pos=parseInt(chip.dataset.pos);
      chip.onclick=()=>{sxMap.find(m=>m.i===sxSelected[pos].i).used=false;sxSelected.splice(pos,1);render();};
    });
    pool.innerHTML=sxMap.filter(m=>!m.used).map((m,j)=>`<div class="chip pool">${m.c}</div>`).join('');
    document.querySelectorAll('#sx-pool .chip').forEach((chip,j)=>{

function renderAdminContent(){
  const c=document.getElementById('admin-content');
  const lessons=lessonsData;
  const allR=Object.values(resultsData);
  const filtR=allR.filter(r=>r.lessonId===adminFilter);
  const done=filtR.filter(r=>r.status==='done');
  const sorted=[...done].sort((a,b)=>(b.totalScore||0)-(a.totalScore||0));
  const avgPct=done.length?Math.round(done.reduce((a,s)=>a+(s.pct||0),0)/done.length):0;
  const avgScore=done.length?Math.round(done.reduce((a,s)=>a+(s.totalScore||0),0)/done.length):0;
  const topScore=done.length?Math.max(...done.map(s=>s.totalScore||0)):0;

// ── Student detail popup ──
function showStudentDetail(sid){
  const s=resultsData[sid];if(!s)return;
  const old=document.getElementById('sdp');if(old)old.remove();
  const p=s.pct||0;const bc=p>=80?'#1D9E75':p>=60?'#EF9F27':'#E24B4A';
  const ts=s.totalScore||0;const tr=s.totalRight||0;const tw=(s.totalAll||0)-tr;
  const ft=s.finishedAt?new Date(s.finishedAt).toLocaleString('vi',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
  const grp={};(s.wrongItems||[]).forEach(w=>{if(!grp[w.char])grp[w.char]={...w,reasons:[]};grp[w.char].reasons.push(w.ans);});
  const wl=Object.values(grp);
  const gameRows=ALL_GAMES.map(g=>{const r=s.rights?.[g.id];const w=s.wrongs?.[g.id];const sc=s.scores?.[g.id];
    if(r===undefined&&w===undefined)return'';const tot=(r||0)+(w||0);const gp=tot>0?Math.round((r||0)/tot*100):0;
    const gbc=gp>=80?'#1D9E75':gp>=60?'#EF9F27':'#E24B4A';const done=(s.doneGames||[]).includes(g.id);
    return `<div style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="font-size:14px;flex-shrink:0">${g.icon}</span>
      <span style="flex:1;font-weight:600">${g.name}</span>
      <span style="color:var(--tl-d);font-size:11px">✓${r||0} ✗${w||0}</span>
      <span style="color:${gbc};font-weight:700;width:32px;text-align:right">${gp}%</span>
      <span style="color:var(--am-m);font-weight:700;width:36px;text-align:right">+${sc||0}đ</span>
      <span style="font-size:9px;padding:2px 6px;border-radius:50px;background:${done?'var(--tl)':'var(--gr)'};color:${done?'var(--tl-d)':'var(--gr-d)'};">${done?'✓':'—'}</span>
    </div>`;}).join('');
  const wrongHtml=wl.length===0?'<div style="text-align:center;padding:10px;color:var(--tl-d);font-weight:600">🎉 Không có mục sai!</div>'
    :wl.map(w=>`<div class="rev-item"><div class="rev-han">${w.char}</div>
      <div class="rev-row" style="color:var(--rd-d)">✗ ${[...new Set(w.reasons)].join(' · ')}</div>
      <div class="rev-row" style="color:var(--tl-d)">✓ ${w.correct}</div>
      ${w.explain?`<div class="rev-ex">${w.explain}</div>`:''}
    </div>`).join('');
  const ov=document.createElement('div');ov.className='popup-ov';ov.id='sdp';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="popup">
    <div class="popup-hdr">
      <div class="popup-title">📋 ${s.name} · ${s.cls||''}</div>
      <button class="popup-close" onclick="document.getElementById('sdp').remove()">✕</button>
    </div>
    <div style="font-size:10px;color:var(--text2);margin-bottom:10px">${s.lessonName||'—'} · Nộp lúc ${ft}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px">
      <div class="sbox"><div class="sn" style="color:var(--am-m)">${ts}</div><div class="sl">Tổng điểm</div></div>
      <div class="sbox"><div class="sn" style="color:${bc}">${p}%</div><div class="sl">Tỉ lệ đúng</div></div>
      <div class="sbox"><div class="sn" style="color:var(--rd-d)">${wl.length}</div><div class="sl">Cần ôn</div></div>
    </div>
    <div class="pct-wrap"><div id="sdp-fill" class="pct-fill" style="width:0%;background:${bc}"></div></div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);margin:10px 0 6px">KẾT QUẢ TỪNG DẠNG BÀI</div>
    <div class="card" style="margin-bottom:12px"><div class="card-body" style="padding:6px 10px">${gameRows||'<div style="font-size:11px;color:var(--text2);text-align:center;padding:8px">Chưa có dữ liệu</div>'}</div></div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px">CẦN ÔN THÊM (${wl.length} MỤC)</div>
    ${wrongHtml}
    <div style="text-align:center;margin-top:14px">
      <button onclick="delResult('${sid}');document.getElementById('sdp').remove()" class="btn btn-rd btn-sm">🗑 Xóa học viên</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const f=document.getElementById('sdp-fill');if(f)f.style.width=p+'%';},100);
}

// ── Toggle/Delete ──
async function toggleGame(lid,gid,enabled){
  try{await fetchLessons(true);const l=lessonsData.find(l=>l.id===lid);if(!l)return;if(!l.enabledGames)l.enabledGames=[...DEFAULT_GAMES];
    if(enabled){if(!l.enabledGames.includes(gid))l.enabledGames.push(gid);}else l.enabledGames=l.enabledGames.filter(g=>g!==gid);
    await gasPost({action:'saveLessons',lessons:lessonsData});toast(enabled?'✓ Đã bật':'✓ Đã tắt');}
  catch(e){toast('Lỗi: '+e.message);}
}
async function toggleLesson(id,open){
  load(true,open?'Đang mở…':'Đang đóng…');
  try{await fetchLessons(true);const l=lessonsData.find(l=>l.id===id);if(l)l.isOpen=open;await gasPost({action:'saveLessons',lessons:lessonsData});toast(open?'🟢 Đã mở!':'⚫ Đã đóng!');adminTab='manage';renderAdminContent();}
  catch(e){toast('Lỗi: '+e.message);}load(false);
}
async function delLesson(id){
  const l=lessonsData.find(l=>l.id===id);if(!confirm(`Xóa bài "${l?.name}"?`))return;
  load(true,'Đang xóa…');
  try{lessonsData=lessonsData.filter(l=>l.id!==id);await gasPost({action:'saveLessons',lessons:lessonsData});if(adminFilter===id)adminFilter=null;toast('Đã xóa!');adminTab='manage';renderAdminContent();}
  catch(e){toast('Lỗi: '+e.message);}load(false);
}
async function delResult(sid){
  if(!confirm('Xóa học viên này?'))return;
  load(true,'Đang xóa…');
  try{delete resultsData[sid];await gasPost({action:'deleteResult',sessionId:sid});toast('Đã xóa!');renderAdminContent();}
  catch(e){toast('Lỗi: '+e.message);}load(false);
}

        <button onclick="analyzeCloze()" style="width:100%;padding:10px;background:var(--pu);color:var(--pu-d);border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:9px">🔍 Phân tích → chọn từ đục lỗ</button>
        <div id="cloze-picker" style="display:none;margin-bottom:9px">
          <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px">Chọn từ/cụm cần đục:</div>
          <div id="cloze-words" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px"></div>
          <div id="cloze-preview" style="font-family:var(--cn);font-size:16px;text-align:center;padding:10px;background:var(--am);border-radius:10px;border:1.5px solid var(--am-b);color:var(--am-d);min-height:44px;display:flex;align-items:center;justify-content:center">(Chọn từ bên trên)</div>
          <button id="btn-add-cloze" onclick="addCloze()" style="width:100%;padding:10px;background:var(--am-b);color:#fff;border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;display:none">+ Thêm câu đục lỗ</button>
        </div>
        <div id="clist" style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:7px;margin-bottom:6px;display:none"></div>
        <div id="ccount" style="font-size:11px;color:var(--text2);text-align:center">Chưa có câu đục lỗ nào</div>
      </div>
      <!-- BUSHOU PANEL -->
      <div id="dp-bushou" class="dp ${newDataTab==='bushou'?'on':''}">
        <div style="font-size:10px;color:var(--text2);margin-bottom:8px">Dùng cho dạng bài Bộ thủ. Học viên nhìn chữ và chọn tên đúng.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
          <input class="add-inp" id="bc" placeholder="Chữ bộ thủ (VD: 讠)" autocomplete="off">
          <input class="add-inp" id="bn" placeholder="Tên bộ thủ (VD: Ngôn)">
        </div>
        <input class="add-inp" id="bm" placeholder="Nghĩa (VD: lời nói, ngôn ngữ)">
        <button onclick="addBushou()" style="width:100%;padding:10px;background:var(--pu);color:var(--pu-d);border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:9px">+ Thêm bộ thủ</button>
        <div id="blist" style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:7px;margin-bottom:6px;display:none"></div>
        <div id="bcount" style="font-size:11px;color:var(--text2);text-align:center">Chưa có bộ thủ nào</div>
      </div>
      <!-- SAVE -->
      <div style="margin-top:14px">
        <button onclick="saveLesson()" style="width:100%;padding:12px;background:var(--am-b);color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer">${isEdit?'💾 Lưu thay đổi':'💾 Lưu bài học mới'}</button>
        <div id="new-msg" style="font-size:12px;text-align:center;margin-top:7px;display:none;font-weight:600;line-height:1.5"></div>
      </div>
    </div>
  </div>`;
  updateVList();updateCList();updateBList();
}
function switchDTab(t){newDataTab=t;['vocab','cloze','bushou'].forEach(x=>{
  const btn=document.getElementById('dtab-'+x);const panel=document.getElementById('dp-'+x);
  if(btn)btn.style.cssText=(t===x?'border-color:var(--am-b);background:var(--am);color:var(--am-m)':'border-color:var(--border);background:#fff;color:var(--text2)')+';padding:8px 4px;border-radius:10px;border-width:1.5px;border-style:solid;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;text-align:center;line-height:1.4';
  if(panel)panel.className='dp'+(t===x?' on':'');
});}
function addVocab(){const c=document.getElementById('nc')?.value.trim(),p=document.getElementById('np')?.value.trim(),v=document.getElementById('nv')?.value.trim(),e=document.getElementById('ne')?.value.trim();if(!c||!p||!v){toast('Hãy điền ít nhất 3 ô!');return;}newVocab.push({char:c,pinyin:p,viet:v,explain:e||`${c} (${p}) — ${v}`});['nc','np','nv','ne'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('nc')?.focus();updateVList();toast(`✓ Đã thêm "${c}"`);}
function updateVList(){const l=document.getElementById('vlist'),c=document.getElementById('vcount');if(!l||!c)return;if(newVocab.length===0){l.style.display='none';c.textContent='Chưa có từ nào';return;}l.style.display='block';l.innerHTML=newVocab.map((v,i)=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px"><span style="font-family:var(--cn);font-size:14px;font-weight:700;color:var(--am-d);width:34px;flex-shrink:0">${v.char.length>3?v.char.slice(0,2)+'…':v.char}</span><span style="color:var(--tl-d);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.pinyin}</span><span style="color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.viet}</span><button onclick="newVocab.splice(${i},1);updateVList()" style="color:var(--rd-d);border:none;background:transparent;cursor:pointer;font-size:16px;padding:3px 5px;flex-shrink:0">✕</button></div>`).join('');c.textContent=`${newVocab.length} từ / câu`;}
function analyzeCloze(){const s=document.getElementById('cl-s')?.value.trim();if(!s){toast('Hãy nhập câu!');return;}_clozeCurrentSentence=s;_clozeSelectedWord='';const chars=Array.from(s.replace(/[？！。，；：""''「」（）()]/g,''));const opts=new Set();for(let i=0;i<chars.length;i++){if(chars[i].match(/[\u4e00-\u9fff]/)){opts.add(chars[i]);if(i+1<chars.length&&chars[i+1].match(/[\u4e00-\u9fff]/))opts.add(chars[i]+chars[i+1]);if(i+2<chars.length&&chars[i+2].match(/[\u4e00-\u9fff]/))opts.add(chars[i]+chars[i+1]+chars[i+2]);}}const picker=document.getElementById('cloze-picker');const words=document.getElementById('cloze-words');const preview=document.getElementById('cloze-preview');const btnAdd=document.getElementById('btn-add-cloze');if(!picker||!words)return;picker.style.display='block';preview.innerHTML='(Chọn từ bên trên)';if(btnAdd)btnAdd.style.display='none';words.innerHTML=[...opts].map(w=>`<button onclick="selectClozeWord('${w.replace(/'/g,"\\'")}',this)" style="font-family:var(--cn);font-size:15px;font-weight:700;padding:6px 12px;border-radius:50px;border:1.5px solid var(--border);background:#fff;color:var(--text);cursor:pointer">${w}</button>`).join('');}
function selectClozeWord(w,btn){_clozeSelectedWord=w;document.querySelectorAll('#cloze-words button').forEach(b=>{b.style.background='#fff';b.style.borderColor='var(--border)';b.style.color='var(--text)';});if(btn){btn.style.background='var(--pu)';btn.style.borderColor='var(--pu-b)';btn.style.color='var(--pu-d)';}const preview=document.getElementById('cloze-preview');if(preview)preview.innerHTML=_clozeCurrentSentence.replace(w,`<span style="background:var(--am-b);color:#fff;padding:0 4px;border-radius:4px">___</span>`);const btnAdd=document.getElementById('btn-add-cloze');if(btnAdd)btnAdd.style.display='block';}
function addCloze(){if(!_clozeCurrentSentence||!_clozeSelectedWord){toast('Hãy chọn từ cần đục!');return;}const p=document.getElementById('cl-p')?.value.trim(),v=document.getElementById('cl-v')?.value.trim();newCloze.push({sentence:_clozeCurrentSentence,answer:_clozeSelectedWord,pinyin:p||'',viet:v||''});['cl-s','cl-p','cl-v'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const picker=document.getElementById('cloze-picker');if(picker)picker.style.display='none';_clozeCurrentSentence='';_clozeSelectedWord='';updateCList();toast('✓ Đã thêm câu đục lỗ!');}
function updateCList(){const cl=document.getElementById('clist'),cc=document.getElementById('ccount');if(!cl||!cc)return;if(newCloze.length===0){cl.style.display='none';cc.textContent='Chưa có câu đục lỗ nào';return;}cl.style.display='block';cl.innerHTML=newCloze.map((c,i)=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:11px"><div style="display:flex;align-items:flex-start;gap:6px"><div style="flex:1"><div style="font-family:var(--cn);font-size:13px;font-weight:700;color:var(--am-d);margin-bottom:2px">${c.sentence.replace(c.answer,'[___]')}</div><div style="color:var(--tl-d);font-size:10px">Đáp án: <b>${c.answer}</b>${c.viet?' · '+c.viet:''}</div></div><button onclick="newCloze.splice(${i},1);updateCList()" style="color:var(--rd-d);border:none;background:transparent;cursor:pointer;font-size:16px;padding:3px 5px;flex-shrink:0">✕</button></div></div>`).join('');cc.textContent=`${newCloze.length} câu đục lỗ`;}
function addBushou(){const c=document.getElementById('bc')?.value.trim(),n=document.getElementById('bn')?.value.trim(),m=document.getElementById('bm')?.value.trim();if(!c||!n){toast('Hãy điền chữ và tên!');return;}newBushou.push({char:c,name:n,mean:m||'—'});['bc','bn','bm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('bc')?.focus();updateBList();toast(`✓ Đã thêm bộ ${n}`);}
function updateBList(){const bl=document.getElementById('blist'),bc=document.getElementById('bcount');if(!bl||!bc)return;if(newBushou.length===0){bl.style.display='none';bc.textContent='Chưa có bộ thủ nào';return;}bl.style.display='block';bl.innerHTML=newBushou.map((b,i)=>`<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px"><span style="font-family:var(--cn);font-size:20px;font-weight:700;color:var(--pu-d);width:28px;flex-shrink:0">${b.char}</span><span style="font-weight:700;flex:1">${b.name}</span><span style="color:var(--text2);flex:1">${b.mean}</span><button onclick="newBushou.splice(${i},1);updateBList()" style="color:var(--rd-d);border:none;background:transparent;cursor:pointer;font-size:16px;padding:3px 5px;flex-shrink:0">✕</button></div>`).join('');bc.textContent=`${newBushou.length} bộ thủ`;}
async function saveLesson(){
  const name=document.getElementById('new-name')?.value.trim();const msg=document.getElementById('new-msg');
  if(!name){if(msg){msg.style.display='block';msg.style.color='var(--rd-d)';msg.textContent='Hãy nhập tên bài học!';}return;}
  if(newVocab.length===0){if(msg){msg.style.display='block';msg.style.color='var(--rd-d)';msg.textContent='Hãy thêm ít nhất 1 từ vựng!';}return;}
  load(true,editingId?'Đang lưu thay đổi…':'Đang lưu bài học…');
  try{
    if(editingId){const idx=lessonsData.findIndex(l=>l.id===editingId);if(idx>=0){lessonsData[idx].name=name;lessonsData[idx].vocab=[...newVocab];lessonsData[idx].cloze=[...newCloze];lessonsData[idx].bushou=[...newBushou];}
      await gasPost({action:'saveLessons',lessons:lessonsData});if(msg){msg.style.display='block';msg.style.color='var(--tl-d)';msg.textContent=`✓ Đã cập nhật "${name}"!`;}toast('✓ Lưu xong!');editingId=null;newVocab=[];newCloze=[];newBushou=[];
    }else{const newL={id:'lesson_'+Date.now(),name,createdAt:Date.now(),isOpen:false,enabledGames:[...DEFAULT_GAMES],vocab:[...newVocab],cloze:[...newCloze],bushou:[...newBushou]};
      lessonsData.push(newL);await gasPost({action:'saveLessons',lessons:lessonsData});adminFilter=newL.id;newVocab=[];newCloze=[];newBushou=[];const nn=document.getElementById('new-name');if(nn)nn.value='';
      if(msg){msg.style.display='block';msg.style.color='var(--tl-d)';msg.textContent=`✓ Đã tạo "${name}" (${newL.vocab.length} từ). Mặc định Đóng — vào Quản lý để Mở!`;}toast('✓ Đã tạo bài mới!');}
    updateVList();updateCList();updateBList();
  }catch(e){if(msg){msg.style.display='block';msg.style.color='var(--rd-d)';msg.textContent='Lỗi: '+e.message;}}
  load(false);
}
</script>
